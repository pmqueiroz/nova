name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc

          - os: macos-15-intel
            target: x86_64-apple-darwin

          - os: macos-latest
            target: aarch64-apple-darwin

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Cache cargo-packager
        id: cache-packager
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-packager*
          key: cargo-packager-${{ runner.os }}-v1

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            pkg-config \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libfuse2

      - name: Install cargo-packager
        if: steps.cache-packager.outputs.cache-hit != 'true'
        run: cargo install cargo-packager --locked

      - name: Build
        run: cargo build --release

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: cargo packager --release --formats nsis --out-dir dist

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cargo packager --release --formats dmg --out-dir dist

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: cargo packager --release --formats deb --formats appimage --out-dir dist

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: packages-${{ matrix.target }}
          path: dist/
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/*

  publish-homebrew-cask:
    name: Publish Homebrew Cask
    needs: release
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_USER: "github-actions[bot]"
      GITHUB_EMAIL: "github-actions[bot]@users.noreply.github.com"
    steps:
      - name: Fetch macOS artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: packages-*apple-darwin
          path: artifacts
          merge-multiple: true

      - name: Compute checksums and filenames
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          INTEL_DMG=$(find artifacts -name "*.dmg" | grep x86_64 | head -1)
          ARM_DMG=$(find artifacts -name "*.dmg" | grep aarch64 | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "intel_sha=$(sha256sum "$INTEL_DMG" | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "arm_sha=$(sha256sum "$ARM_DMG" | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "intel_dmg=$(basename "$INTEL_DMG")" >> $GITHUB_OUTPUT
          echo "arm_dmg=$(basename "$ARM_DMG")" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6
        with:
          persist-credentials: true
          repository: pmqueiroz/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Write cask file
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          INTEL_SHA="${{ steps.meta.outputs.intel_sha }}"
          ARM_SHA="${{ steps.meta.outputs.arm_sha }}"
          INTEL_DMG="${{ steps.meta.outputs.intel_dmg }}"
          ARM_DMG="${{ steps.meta.outputs.arm_dmg }}"
          mkdir -p Casks
          cat > Casks/nova.rb << CASK
          cask "nova" do
            version "$VERSION"

            on_intel do
              url "https://github.com/pmqueiroz/nova/releases/download/v#{version}/$INTEL_DMG"
              sha256 "$INTEL_SHA"
            end

            on_arm do
              url "https://github.com/pmqueiroz/nova/releases/download/v#{version}/$ARM_DMG"
              sha256 "$ARM_SHA"
            end

            name "Nova"
            desc "A GPU-accelerated terminal emulator"
            homepage "https://github.com/pmqueiroz/nova"

            app "Nova.app"
          end
          CASK

      - name: Commit cask file
        run: |
          git config --global user.name "${GITHUB_USER}"
          git config --global user.email "${GITHUB_EMAIL}"
          git add Casks/nova.rb
          git commit -m "nova ${{ steps.meta.outputs.version }}"
          git push
