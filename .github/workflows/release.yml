name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc

          - os: macos-15-intel
            target: x86_64-apple-darwin

          - os: macos-latest
            target: aarch64-apple-darwin

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Cache cargo-packager
        id: cache-packager
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-packager*
          key: cargo-packager-${{ runner.os }}-v1

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            pkg-config \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libfuse2 \
            libasound2-dev

      - name: Install cargo-packager
        if: steps.cache-packager.outputs.cache-hit != 'true'
        run: cargo install cargo-packager --locked

      - name: Build
        run: cargo build --release

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: cargo packager --release --formats nsis --out-dir dist

      - name: Package (Windows portable ZIP)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = "${env:GITHUB_REF_NAME}".TrimStart('v')
          Compress-Archive -Path target/release/nova.exe -DestinationPath "dist/nova_${ver}_x64_portable.zip"

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cargo packager --release --formats dmg --out-dir dist

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: cargo packager --release --formats deb --formats appimage --out-dir dist

      - name: Package (RPM)
        if: runner.os == 'Linux'
        run: |
          cargo install cargo-generate-rpm --locked
          cargo generate-rpm --output dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: packages-${{ matrix.target }}
          path: dist/
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/*

  update-readme:
    name: Update README versions
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update download URLs
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i -E \
            -e "s|/download/v[0-9]+\.[0-9]+\.[0-9]+/|/download/v${VERSION}/|g" \
            -e "s|nova_[0-9]+\.[0-9]+\.[0-9]+_|nova_${VERSION}_|g" \
            README.md

      - name: Commit README
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update README download links to v${VERSION}"
          git push

  publish-homebrew:
    name: Publish Homebrew
    needs: release
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_USER: "github-actions[bot]"
      GITHUB_EMAIL: "github-actions[bot]@users.noreply.github.com"
    steps:
      - name: Fetch macOS artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: packages-*apple-darwin
          path: artifacts
          merge-multiple: true

      - name: Fetch Linux artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: packages-*linux*
          path: artifacts
          merge-multiple: true

      - name: Compute checksums and filenames
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          INTEL_DMG=$(find artifacts -name "*.dmg" | grep x86_64 | head -1)
          ARM_DMG=$(find artifacts -name "*.dmg" | grep aarch64 | head -1)
          LINUX_APPIMAGE=$(find artifacts -name "*.AppImage" | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "intel_sha=$(sha256sum "$INTEL_DMG" | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "arm_sha=$(sha256sum "$ARM_DMG" | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "linux_sha=$(sha256sum "$LINUX_APPIMAGE" | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "intel_dmg=$(basename "$INTEL_DMG")" >> $GITHUB_OUTPUT
          echo "arm_dmg=$(basename "$ARM_DMG")" >> $GITHUB_OUTPUT
          echo "linux_appimage=$(basename "$LINUX_APPIMAGE")" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6
        with:
          persist-credentials: true
          repository: pmqueiroz/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Write cask file
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          INTEL_SHA="${{ steps.meta.outputs.intel_sha }}"
          ARM_SHA="${{ steps.meta.outputs.arm_sha }}"
          INTEL_DMG="${{ steps.meta.outputs.intel_dmg }}"
          ARM_DMG="${{ steps.meta.outputs.arm_dmg }}"
          mkdir -p Casks
          cat > Casks/nova.rb << CASK
          cask "nova" do
            version "$VERSION"

            on_intel do
              url "https://github.com/pmqueiroz/nova/releases/download/v#{version}/$INTEL_DMG"
              sha256 "$INTEL_SHA"
            end

            on_arm do
              url "https://github.com/pmqueiroz/nova/releases/download/v#{version}/$ARM_DMG"
              sha256 "$ARM_SHA"
            end

            name "Nova"
            desc "A GPU-accelerated terminal emulator"
            homepage "https://github.com/pmqueiroz/nova"

            app "Nova.app"

            binary "#{appdir}/Nova.app/Contents/MacOS/nova", target: "nova"
          end
          CASK

      - name: Write Linux formula
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          LINUX_SHA="${{ steps.meta.outputs.linux_sha }}"
          LINUX_APPIMAGE="${{ steps.meta.outputs.linux_appimage }}"
          mkdir -p Formula
          cat > Formula/nova.rb << FORMULA
          class Nova < Formula
            desc "A GPU-accelerated terminal emulator"
            homepage "https://github.com/pmqueiroz/nova"
            version "$VERSION"

            on_linux do
              url "https://github.com/pmqueiroz/nova/releases/download/v#{version}/$LINUX_APPIMAGE"
              sha256 "$LINUX_SHA"
            end

            def install
              appimage = Dir["*.AppImage"].first
              chmod "+x", appimage
              bin.install appimage => "nova"
            end
          end
          FORMULA

      - name: Commit
        run: |
          git config --global user.name "${GITHUB_USER}"
          git config --global user.email "${GITHUB_EMAIL}"
          git add Casks/nova.rb Formula/nova.rb
          git commit -m "nova ${{ steps.meta.outputs.version }}"
          git push

  publish-winget:
    name: Publish Winget
    needs: release
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: pmqueiroz.Nova
          token: ${{ secrets.WINGET_TOKEN }}
          installers-regex: '_x64-setup\.exe$'

  publish-scoop:
    name: Publish Scoop
    needs: release
    runs-on: ubuntu-latest
    env:
      GITHUB_USER: "github-actions[bot]"
      GITHUB_EMAIL: "github-actions[bot]@users.noreply.github.com"
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          pattern: packages-x86_64-pc-windows-msvc
          path: artifacts
          merge-multiple: true

      - name: Compute metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP=$(find artifacts -name "*_x64_portable.zip" | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha=$(sha256sum "$ZIP" | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "zip=$(basename "$ZIP")" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6
        with:
          repository: pmqueiroz/scoop-bucket
          token: ${{ secrets.PACKAGES_TOKEN }}
          persist-credentials: true

      - name: Write manifest
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          SHA="${{ steps.meta.outputs.sha }}"
          ZIP="${{ steps.meta.outputs.zip }}"
          cat > nova.json << EOF
          {
            "version": "$VERSION",
            "description": "A GPU-accelerated terminal emulator",
            "homepage": "https://github.com/pmqueiroz/nova",
            "license": "MIT",
            "architecture": {
              "64bit": {
                "url": "https://github.com/pmqueiroz/nova/releases/download/v$VERSION/$ZIP",
                "hash": "$SHA"
              }
            },
            "bin": "nova.exe",
            "checkver": { "github": "https://github.com/pmqueiroz/nova" },
            "autoupdate": {
              "architecture": {
                "64bit": {
                  "url": "https://github.com/pmqueiroz/nova/releases/download/v\$version/nova_\$version_x64_portable.zip"
                }
              }
            }
          }
          EOF

      - name: Commit and push
        run: |
          git config user.name "${GITHUB_USER}"
          git config user.email "${GITHUB_EMAIL}"
          git add nova.json
          git diff --cached --quiet || git commit -m "nova ${{ steps.meta.outputs.version }}"
          git push

  publish-aur:
    name: Publish AUR
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          pattern: packages-x86_64-unknown-linux-gnu
          path: artifacts
          merge-multiple: true

      - name: Compute metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APPIMAGE=$(find artifacts -name "*.AppImage" | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha=$(sha256sum "$APPIMAGE" | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "appimage=$(basename "$APPIMAGE")" >> $GITHUB_OUTPUT

      - name: Write PKGBUILD
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          SHA="${{ steps.meta.outputs.sha }}"
          APPIMAGE="${{ steps.meta.outputs.appimage }}"
          mkdir aur-pkg
          cat > aur-pkg/PKGBUILD << EOF
          # Maintainer: pmqueiroz <pedroqueiroz593@gmail.com>
          pkgname=nova-bin
          pkgver=$VERSION
          pkgrel=1
          pkgdesc="A GPU-accelerated terminal emulator"
          arch=('x86_64')
          url="https://github.com/pmqueiroz/nova"
          license=('MIT')
          depends=('libxkbcommon' 'wayland' 'libgl')
          provides=('nova')
          conflicts=('nova')
          source_x86_64=("https://github.com/pmqueiroz/nova/releases/download/v\$pkgver/$APPIMAGE")
          sha256sums_x86_64=('$SHA')

          package() {
            chmod +x "\${srcdir}/$APPIMAGE"
            install -Dm755 "\${srcdir}/$APPIMAGE" "\${pkgdir}/usr/bin/nova"
          }
          EOF

      - name: Convert SSH key to OPENSSH format
        id: convert_key
        run: |
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" | tr -d '\r' > /tmp/aur_key
          echo "" >> /tmp/aur_key
          chmod 600 /tmp/aur_key
          ssh-keygen -p -P "" -N "" -o -f /tmp/aur_key
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "key<<$EOF" >> $GITHUB_OUTPUT
          cat /tmp/aur_key >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT
          rm -f /tmp/aur_key

      - uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: nova-bin
          pkgbuild: aur-pkg/PKGBUILD
          commit_username: pmqueiroz
          commit_email: pedroqueiroz593@gmail.com
          ssh_private_key: ${{ steps.convert_key.outputs.key }}
          commit_message: "Update to ${{ steps.meta.outputs.version }}"

  publish-apt:
    name: Publish APT repo
    needs: release
    runs-on: ubuntu-latest
    env:
      GITHUB_USER: "github-actions[bot]"
      GITHUB_EMAIL: "github-actions[bot]@users.noreply.github.com"
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          pattern: packages-x86_64-unknown-linux-gnu
          path: /tmp/nova-artifacts
          merge-multiple: true

      - uses: actions/checkout@v6
        with:
          repository: pmqueiroz/apt-repo
          token: ${{ secrets.PACKAGES_TOKEN }}
          persist-credentials: true

      - name: Install apt-ftparchive
        run: sudo apt-get install -y apt-utils

      - name: Add .deb and rebuild index
        run: |
          mkdir -p pool/main dists/stable/main/binary-amd64
          cp /tmp/nova-artifacts/*.deb pool/main/
          apt-ftparchive packages pool/main > dists/stable/main/binary-amd64/Packages
          gzip -kf dists/stable/main/binary-amd64/Packages
          apt-ftparchive release dists/stable > dists/stable/Release

      - name: Commit and push
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git config user.name "${GITHUB_USER}"
          git config user.email "${GITHUB_EMAIL}"
          git add pool/ dists/
          git diff --cached --quiet || git commit -m "nova $VERSION"
          git push

  publish-rpm:
    name: Publish RPM repo
    needs: release
    runs-on: ubuntu-latest
    env:
      GITHUB_USER: "github-actions[bot]"
      GITHUB_EMAIL: "github-actions[bot]@users.noreply.github.com"
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          pattern: packages-x86_64-unknown-linux-gnu
          path: /tmp/nova-artifacts
          merge-multiple: true

      - uses: actions/checkout@v6
        with:
          repository: pmqueiroz/rpm-repo
          token: ${{ secrets.PACKAGES_TOKEN }}
          persist-credentials: true

      - name: Install createrepo_c
        run: sudo apt-get install -y createrepo-c

      - name: Add RPM and rebuild metadata
        run: |
          mkdir -p packages
          cp /tmp/nova-artifacts/*.rpm packages/
          createrepo_c packages/

      - name: Commit and push
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git config user.name "${GITHUB_USER}"
          git config user.email "${GITHUB_EMAIL}"
          git add packages/
          git diff --cached --quiet || git commit -m "nova $VERSION"
          git push
