[package]
name = "nova"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
async-channel = "2.5.0"
chrono = "0.4.44"
iced = { version = "0.14.0", features = ["tokio"] }
image = { version = "0.25", default-features = false, features = ["png"] }
portable-pty = "0.9.0"
vte = "0.15.0"

[build-dependencies]
ico = "0.3"

[target.'cfg(windows)'.build-dependencies]
winres = "0.1"
