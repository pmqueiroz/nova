[general]
editor = "nano"
bell = "none"
shells = ["pwsh", "cmd"]

[status-bar]
visible = true
date-format = "%b %d"
time-format = "%H:%M:%S"

[theme.font]
size = 16
family = "FiraCode Nerd Font"

[theme.colors]
background = "#0D0D0D"
foreground = "#E5E5E5"
accent = "#3ECF8E"
foreground-muted = "#666666"
border = "#FFFFFF12"
cursor = "#3ECF8E"

[keybindings]
new-tab = "cmd+t"
close-tab = "cmd+w"
next-tab = "ctrl+tab"
prev-tab = "ctrl+shift+tab"
paste = "cmd+v"
copy = "cmd+c"
